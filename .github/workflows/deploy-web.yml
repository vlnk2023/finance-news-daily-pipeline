name: Deploy Digest Web

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate frontend config
        run: |
          cat > web/config.js <<'EOF'
          window.FINANCE_DIGEST_CONFIG = {
            supabaseUrl: "${{ secrets.SUPABASE_URL }}",
            supabaseAnonKey: "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}",
            strictPublicViews: ${{ secrets.SUPABASE_STRICT_PUBLIC_VIEWS == 'true' && 'true' || 'false' }},
          };
          EOF

      - name: Validate frontend config
        run: |
          test -n "${{ secrets.SUPABASE_URL }}"
          test -n "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"

      - name: Verify Supabase public read surface
        run: |
          PUBLIC_VIEW_FLAG="--allow-missing-public-views"
          BASE_TABLE_MODE="open"
          if [ "${{ secrets.SUPABASE_STRICT_PUBLIC_VIEWS }}" = "true" ]; then
            PUBLIC_VIEW_FLAG=""
            BASE_TABLE_MODE="restricted"
          fi
          python scripts/check_public_read_surface.py --base-table-mode "$BASE_TABLE_MODE" $PUBLIC_VIEW_FLAG
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
