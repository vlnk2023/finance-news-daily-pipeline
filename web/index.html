<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance News Digest</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Finance News Digest</h1>
        <p>Daily digest generated from the finance news pipeline.</p>
      </div>
      <div class="topbar-actions">
        <a class="nav-link" href="./admin.html">Admin</a>
        <button id="refreshButton" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="panel">
          <h2>Digest History</h2>
          <div id="digestList" class="digest-list"></div>
        </div>
      </aside>

      <section class="content">
        <div id="status" class="status">Loading...</div>
        <section class="panel content-header-panel">
          <div class="content-header">
            <h2 id="digestTitle" class="digest-title">Daily Digest</h2>
            <div class="content-header-meta">
              <span id="generatedAt" class="generated-at">Generated at: -</span>
              <span id="validationModeBadge" class="mode-badge mode-unknown">mode: -</span>
            </div>
          </div>
        </section>
        <article id="digest" class="digest"></article>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./shared.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
